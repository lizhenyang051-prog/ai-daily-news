<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 每日日报</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--accent2:#818cf8;--text:#f1f5f9;--muted:#94a3b8;--border:#334155}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px}
.container{max-width:900px;margin:0 auto}
header{text-align:center;padding:40px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px}
header h1{font-size:2.2em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .subtitle{color:var(--muted);margin-top:8px;font-size:.95em}
header .update-time{color:var(--muted);font-size:.85em;margin-top:4px}
.stats{display:flex;gap:20px;justify-content:center;margin:20px 0 30px;flex-wrap:wrap}
.stat-item{background:var(--card);padding:10px 20px;border-radius:10px;border:1px solid var(--border);font-size:.9em}
.stat-item strong{color:var(--accent)}
.section{margin-bottom:36px}
.section-title{font-size:1.3em;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:1.2em}
.section-title .badge{font-size:.55em;background:var(--accent);color:#000;padding:2px 10px;border-radius:20px;font-weight:600}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:12px}
.news-card:hover{border-color:var(--accent)}
.news-card .meta{display:flex;gap:12px;font-size:.8em;color:var(--muted);margin-bottom:6px;flex-wrap:wrap}
.news-card .meta .source{color:var(--accent);font-weight:600}
.news-card .meta .tag{background:rgba(56,189,248,0.15);color:var(--accent);padding:1px 8px;border-radius:4px;font-size:.85em}
.news-card h3{font-size:1.05em;font-weight:600;margin-bottom:6px}
.news-card h3 a{color:var(--text);text-decoration:none}
.news-card h3 a:hover{color:var(--accent)}
.news-card p{color:var(--muted);font-size:.9em;line-height:1.5}
.focus-card{background:linear-gradient(135deg,var(--card),#1a2332);border:1px solid var(--accent);border-radius:14px;padding:24px 26px;margin-bottom:14px}
.focus-card .meta .source{color:#fbbf24}
.focus-card h3{font-size:1.15em}
.loading,.error{text-align:center;padding:80px 20px;color:var(--muted)}
.loading .spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error h2{color:#f87171;margin-bottom:10px}
footer{text-align:center;padding:30px 0;color:var(--muted);font-size:.85em;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:640px){header h1{font-size:1.6em}.news-card,.focus-card{padding:14px 16px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🤖 AI 每日日报</h1>
<p class="subtitle">聚合全球AI资讯 · 每日自动更新</p>
<p class="update-time" id="updateTime">加载中...</p>
</header>
<div class="stats" id="stats"></div>
<div id="app"><div class="loading"><div class="spinner"></div><p>正在加载今日日报...</p></div></div>
<footer><p>AI 每日日报 · 数据来源于公开RSS源 · 仅供参考</p></footer>
</div>
<script>
const L={news:{icon:'📰',label:'最新动态'},paper:{icon:'📄',label:'热门论文'},discussion:{icon:'💬',label:'社区热议'}};
async function load(){try{const r=await fetch('news_data.json?_='+Date.now());if(!r.ok)throw Error();const d=await r.json();render(d)}catch(e){document.getElementById('app').innerHTML='<div class="error"><h2>😿 暂时没有日报数据</h2><p>GitHub Action 正在运行中，请过几分钟刷新页面</p></div>'}}
function render(d){const a=d.articles||[];document.getElementById('updateTime').textContent='🕐 更新于 '+d.updated_at;const s=[...new Set(a.map(x=>x.source))];document.getElementById('stats').innerHTML='<div class="stat-item">📊 今日资讯 <strong>'+a.length+'</strong> 条</div><div class="stat-item">📡 信息来源 <strong>'+s.length+'</strong> 个</div>';let h='<div class="section"><h2 class="section-title"><span class="icon">⭐</span> 今日焦点 <span class="badge">TOP 3</span></h2>';for(const i of a.slice(0,3))h+=c(i,1);h+='</div>';for(const[k,v]of Object.entries(L)){const i=a.filter(x=>x.category===k);if(!i.length)continue;h+='<div class="section"><h2 class="section-title"><span class="icon">'+v.icon+'</span> '+v.label+'</h2>';for(const j of i)h+=c(j);h+='</div>'}document.getElementById('app').innerHTML=h}
function c(i,f){const t=i.lang==='zh'?'🇨🇳':'🌐';const cl=f?'focus-card':'news-card';const tm=i.published?i.published.slice(5,16):'';return'<div class="'+cl+'"><div class="meta"><span class="source">'+i.source+'</span><span>'+tm+'</span><span class="tag">'+t+'</span></div><h3><a href="'+i.link+'" target="_blank" rel="noopener">'+i.title+'</a></h3>'+(i.summary?'<p>'+i.summary+'</p>':'')+'</div>'}
load();
</script>
</body>
</html>
